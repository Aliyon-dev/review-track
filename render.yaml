# Render Blueprint — Static Site (recommended for this SPA)
# https://render.com/docs/blueprint-spec
#
# After connecting the repo, set VITE_API_BASE_URL in the Render dashboard
# to your backend URL, e.g. https://review-track-backend.onrender.com

services:
  - type: web
    name: review-track
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
